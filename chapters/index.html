<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Styrian Grammar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --paper: #f4f6f9;
      --paper-rgb: 244, 246, 249;
      --ink: #16181d;
      --ink-rgb: 22, 24, 29;
      --muted: #6f7782;
      --signal: #2f6fd6;
      --signal-rgb: 47, 111, 214;
      --surface: rgba(255, 255, 255, 0.74);
      --surface-strong: rgba(255, 255, 255, 0.86);
      --rule: rgba(22, 24, 29, 0.08);
      --shadow: 0 24px 60px rgba(22, 24, 29, 0.07);
      --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", Inter, "Segoe UI", sans-serif;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #f8fafc 0%, var(--paper) 100%);
      color: var(--ink);
    }

    html { font-size: 14.5px; }
    @media (max-width: 640px) { html { font-size: 16px; } }

    body {
      font-family: var(--font-ui);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .shell-card {
      width: min(100%, 30rem);
      padding: 1.3rem 1.35rem 1.35rem;
      border-radius: 1.35rem;
      background: var(--surface-strong);
      box-shadow: 0 18px 44px rgba(22, 24, 29, 0.05);
    }

    .shell-eyebrow {
      margin: 0 0 0.5rem;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .shell-title {
      margin: 0;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    .shell-copy {
      margin: 0.75rem 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }

    .loading-row {
      width: min(100%, 10rem);
      height: 0.26rem;
      margin-top: 1rem;
      border-radius: 999px;
      background: rgba(var(--ink-rgb), 0.08);
      overflow: hidden;
    }
    .loading-bar {
      display: block;
      width: 38%;
      height: 100%;
      border-radius: inherit;
      background: rgba(var(--ink-rgb), 0.22);
      animation: loading-shift 1.35s ease-in-out infinite;
    }
    @keyframes loading-shift {
      0%   { transform: translateX(-120%); }
      55%  { transform: translateX(135%); }
      100% { transform: translateX(225%); }
    }

    #error {
      display: none;
      min-height: 100vh;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    #error .shell-card {
      margin: 0 auto;
    }

    #error h2 {
      color: var(--signal);
      margin: 0;
      font-size: clamp(1.3rem, 2.8vw, 1.75rem);
      letter-spacing: -0.03em;
    }

    #error p {
      margin: 0.75rem 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    #error pre {
      margin: 1rem 0 0;
      background: rgba(var(--signal-rgb), 0.06);
      border: 1px solid rgba(var(--signal-rgb), 0.12);
      padding: 1rem;
      border-radius: 0.9rem;
      font-family: "SFMono-Regular", "Cascadia Mono", Consolas, monospace;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #error a {
      color: inherit;
      text-decoration-color: rgba(var(--signal-rgb), 0.35);
      text-underline-offset: 0.16em;
    }

    #content { display: none; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="shell-card" role="status" aria-live="polite">
      <p class="shell-eyebrow">Styrian Grammar</p>
      <h1 class="shell-title">Loading the index and chapter map</h1>
      <p class="shell-copy">Preparing the browser edition, chapter links, and download tools.</p>
      <div class="loading-row" aria-hidden="true">
        <span class="loading-bar"></span>
      </div>
    </div>
  </div>

  <div id="error">
    <div class="shell-card">
      <p class="shell-eyebrow">Styrian Grammar</p>
      <h2>Failed to load</h2>
      <p id="error-msg"></p>
      <pre id="error-detail"></pre>
      <p><a href="index.html"><i class="bi bi-arrow-left" aria-hidden="true"></i> Back to index</a></p>
    </div>
  </div>

  <div id="content"></div>

  <script src="markup.js"></script>
  <script>
  (function () {
    'use strict';

    // ── Utilities ────────────────────────────────────────────────────────

    var parser  = new DOMParser();
    var expand  = window.StyrianMarkup.expand;

    function fetchText(url) {
      return fetch(url).then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + url);
        return r.text();
      });
    }

    function parseXml(text) {
      var doc = parser.parseFromString(text, 'application/xml');
      var err = doc.querySelector('parsererror');
      if (err) throw new Error('XML parse error:\n' + err.textContent);
      return doc;
    }

    function showError(msg, detail) {
      document.getElementById('loading').style.display = 'none';
      var el   = document.getElementById('error');
      el.style.display = 'block';
      document.getElementById('error-msg').textContent    = msg;
      document.getElementById('error-detail').textContent = detail || '';
    }

    // ── Lexeme pre-resolver (mirrors download.js) ────────────────────────
    // XSLTProcessor blocks document() calls, so we resolve <w ref> → @v
    // in JS before handing the DOM to XSLT.

    function candidateFormIds(formId) {
      return ({
        '1s': ['1sg'], '2s': ['2sg'], '3s': ['3sg'],
        '1p': ['1pl'], '2p': ['2pl'], '3p': ['3pl'],
        'pp': ['ppl'],
        'lm': ['lptc.m'], 'lf': ['lptc.f'], 'ln': ['lptc.n'], 'lp': ['lptc.pl'],
        'i2s': ['imp.2sg'], 'i2p': ['imp.2pl'],
        'nm': ['nom.sg'], 'nom.s': ['nom.sg'],
        'o': ['obl.sg'],
        'p': ['pl'],
        'ms': ['m.sg'], 'fs': ['f.sg'], 'ns': ['n.sg'],
        'mo': ['m.sg.obl'], 'fo': ['f.sg.obl'], 'no': ['n.sg.obl'],
        'po': ['pl.obl'], 'o.p': ['pl.obl'], 'o.pl': ['pl.obl'],
        'b': ['base']
      })[formId] || [formId];
    }

    function canonicalFormId(formId) {
      var candidates = candidateFormIds(formId);
      return candidates.length ? candidates[0] : formId;
    }

    function resolveSingleForm(entry, formId, lexdoc) {
      var forms = entry.querySelectorAll('form');
      var i;
      var tplId;
      var tplRoot;
      var tpl = null;
      var children;
      var t;
      var tplForms;
      var pattern = null;
      var p;
      var stemName;
      var stemEls;
      var stemVal = null;
      var mainStem = null;
      var s;

      for (i = 0; i < forms.length; i++) {
        if (forms[i].getAttribute('f') === formId) {
          return forms[i].getAttribute('v');
        }
      }

      tplId = entry.getAttribute('template');
      if (!tplId) return null;
      tplRoot = lexdoc.querySelector('templates');
      if (!tplRoot) return null;
      children = tplRoot.children;
      for (t = 0; t < children.length; t++) {
        if (children[t].getAttribute('id') === tplId) { tpl = children[t]; break; }
      }
      if (!tpl) return null;
      tplForms = tpl.querySelectorAll('form');
      for (p = 0; p < tplForms.length; p++) {
        if (tplForms[p].getAttribute('f') === formId) { pattern = tplForms[p]; break; }
      }
      if (!pattern) return null;
      stemName = pattern.getAttribute('stem') || 'main';
      stemEls = entry.querySelectorAll('stem');
      for (s = 0; s < stemEls.length; s++) {
        var sn = stemEls[s].getAttribute('name');
        if (sn === stemName) { stemVal = stemEls[s].getAttribute('v'); break; }
        if (sn === 'main' && !mainStem) mainStem = stemEls[s].getAttribute('v');
      }
      if (!stemVal) stemVal = mainStem;
      if (!stemVal && stemEls.length) stemVal = stemEls[0].getAttribute('v');
      if (!stemVal) return null;
      return (pattern.getAttribute('prefix') || '') + stemVal + (pattern.getAttribute('suffix') || '');
    }

    function resolveFormId(entry, formId, lexdoc) {
      var candidates = candidateFormIds(formId);
      var i;

      for (i = 0; i < candidates.length; i++) {
        if (resolveSingleForm(entry, candidates[i], lexdoc)) {
          return candidates[i];
        }
      }

      return candidates.length === 1 ? candidates[0] : null;
    }

    function resolveForm(entry, formId, lexdoc) {
      var candidates = candidateFormIds(formId);
      var i;

      for (i = 0; i < candidates.length; i++) {
        var resolved = resolveSingleForm(entry, candidates[i], lexdoc);
        if (resolved) return resolved;
      }

      return null;
    }

    function getLemma(entry, lexdoc) {
      var pos = entry.getAttribute('pos');
      var f;
      if (pos === 'v')   { f = resolveForm(entry, 'inf',    lexdoc); if (f) return f; }
      if (pos === 'n')   { f = resolveForm(entry, 'nom.sg', lexdoc); if (f) return f; }
      if (pos === 'adj') { f = resolveForm(entry, 'm.sg',   lexdoc); if (f) return f; }
      var first = entry.querySelector('form');
      return first ? first.getAttribute('v') : entry.getAttribute('id');
    }

    var CYR_LOWER = 'абвгдежзийіїклмнопрстуфхцчшӑюя';
    var CYR_UPPER = 'АБВГДЕЖЗИЙІЇКЛМНОПРСТУФХЦЧШӐЮЯ';
    function capFirst(s) {
      if (!s) return s;
      var idx = CYR_LOWER.indexOf(s.charAt(0));
      return idx >= 0 ? CYR_UPPER.charAt(idx) + s.slice(1) : s;
    }

    function preResolve(xmlDoc, lexdoc) {
      var wEls    = xmlDoc.querySelectorAll('w');
      var entries = lexdoc.querySelectorAll('lex');
      for (var i = 0; i < wEls.length; i++) {
        var w   = wEls[i];
        var ref = w.getAttribute('ref');
        if (!ref) continue;
        var entry = null;
        for (var j = 0; j < entries.length; j++) {
          if (entries[j].getAttribute('id') === ref) { entry = entries[j]; break; }
        }
        if (!entry) continue;
        var lemma = getLemma(entry, lexdoc) || ref;
        var infl  = w.getAttribute('infl') || '';
        var fv    = (infl && resolveForm(entry, infl, lexdoc)) || lemma;
        var inflResolved = infl ? resolveFormId(entry, infl, lexdoc) : '';
        if (w.getAttribute('cap') === '1') fv = capFirst(fv);
        w.setAttribute('v',     fv);
        w.setAttribute('lemma', lemma);
        if (inflResolved) w.setAttribute('infl', inflResolved);
      }
    }

    // ── Nav link rewriting ───────────────────────────────────────────────
    // After XSLT renders any page, rewrite all XML hrefs to viewer routing
    // so the XSL never needs touching.
    //   ch*.xml          → index.html?ch=ch*.xml
    //   index.xml        → index.html

    function rewriteNavLinks(root) {
      var links = root.querySelectorAll('a[href]');
      for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (!href) continue;
        if (/^ch\d+.*\.xml$/.test(href)) {
          links[i].setAttribute('href', 'index.html?ch=' + href);
        }
      }
    }

    // ── Chapter nav injection ────────────────────────────────────────────
    // XSLTProcessor blocks document() calls, so the XSL template for <ch>
    // cannot resolve prev/next entries or the full chapter list from
    // index.xml.  We fetch index.xml ourselves and inject all three pieces
    // of missing navigation into the already-rendered HTML:
    //   • navline prev / next links
    //   • scroll-crumb prev / next arrow buttons
    //   • scroll-crumb chapter-browser dropdown list

    function injectChapterNav(content, indexDoc) {
      var entries = Array.prototype.slice.call(
        indexDoc.querySelectorAll('grammar > ch')
      );
      if (!entries.length) return;

      // Find the current chapter's position in the list.
      var idx = -1;
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].getAttribute('file') === chFile) { idx = i; break; }
      }
      if (idx === -1) return;

      var prevEntry = idx > 0 ? entries[idx - 1] : null;
      var nextEntry = idx < entries.length - 1 ? entries[idx + 1] : null;

      // ── 1. Navline prev / next links ───────────────────────────────────
      var navline = content.querySelector('.navline');
      if (navline) {
        var themeBtn = navline.querySelector('.navline-theme-toggle');
        function makeNavLink(entry, label) {
          var a = document.createElement('a');
          a.href = 'index.html?ch=' + entry.getAttribute('file');
          a.textContent = label + ': ' + entry.getAttribute('t');
          return a;
        }
        if (prevEntry) navline.insertBefore(makeNavLink(prevEntry, 'Previous'), themeBtn);
        if (nextEntry) navline.insertBefore(makeNavLink(nextEntry, 'Next'), themeBtn);
      }

      // ── 2. Scroll-crumb prev / next arrow buttons ──────────────────────
      var crumbInner = content.querySelector('.scroll-crumb-inner');
      if (crumbInner) {
        var crumbTheme = crumbInner.querySelector('.scroll-crumb-theme-toggle');
        function makeCrumbArrow(entry, dir) {
          var a = document.createElement('a');
          a.className = 'scroll-crumb-item scroll-crumb-chapter-link';
          a.href = 'index.html?ch=' + entry.getAttribute('file');
          var label = (dir === 'prev' ? 'Previous' : 'Next') +
                      ' chapter: ' + entry.getAttribute('t');
          a.setAttribute('aria-label', label);
          a.setAttribute('title', label);
          var icon = document.createElement('i');
          icon.className = 'bi bi-chevron-' + (dir === 'prev' ? 'left' : 'right');
          icon.setAttribute('aria-hidden', 'true');
          a.appendChild(icon);
          return a;
        }
        if (prevEntry) crumbInner.insertBefore(makeCrumbArrow(prevEntry, 'prev'), crumbTheme);
        if (nextEntry) crumbInner.insertBefore(makeCrumbArrow(nextEntry, 'next'), crumbTheme);
      }

      // ── 3. Chapter-browser dropdown (full chapter list) ────────────────
      var chapterMenu = content.querySelector('#scroll-crumb-chapter-menu .contents');
      if (chapterMenu) {
        var currentId = entries[idx].getAttribute('id');
        for (var j = 0; j < entries.length; j++) {
          var e     = entries[j];
          var li    = document.createElement('li');
          var a     = document.createElement('a');
          a.href    = 'index.html?ch=' + e.getAttribute('file');
          a.className = 'chapter-entry-link' +
                        (e.getAttribute('id') === currentId ? ' is-current' : '');
          var numSpan   = document.createElement('span');
          numSpan.className   = 'chapter-entry-number';
          numSpan.textContent = 'Ch. ' + e.getAttribute('id');
          var titleSpan   = document.createElement('span');
          titleSpan.className   = 'chapter-entry-title';
          titleSpan.textContent = e.getAttribute('t');
          a.appendChild(numSpan);
          a.appendChild(titleSpan);
          li.appendChild(a);
          chapterMenu.appendChild(li);
        }
      }
    }

    // ── Core render pipeline ─────────────────────────────────────────────

    function render(xmlText, xslDoc, lexDoc, isIndex, indexDoc) {
      // 1. Expand compact notation.
      var expanded = expand(xmlText);

      // 2. Parse as XML.
      var xmlDoc = parseXml(expanded);

      // 3. Pre-resolve <w> elements for XSLTProcessor.
      if (!isIndex) preResolve(xmlDoc, lexDoc);

      // 4. XSLT transform.
      var proc = new XSLTProcessor();
      proc.importStylesheet(xslDoc);
      // Point lexicon-uri at the absolute URL so XSL document() calls
      // (used in the native XML viewer fallback path) work correctly.
      var lexUri = new URL('lexicon.xml', document.baseURI).href;
      proc.setParameter(null, 'lexicon-uri', lexUri);
      var result = proc.transformToDocument(xmlDoc);
      if (!result) throw new Error('XSLT transform returned null.');

      // 5. Inject into page.
      var html = result.querySelector('html');
      if (!html) throw new Error('XSLT output contained no <html> element.');

      // Adopt stylesheet and body from the transformed document.
      var style = result.querySelector('style');
      if (style) {
        var s = document.createElement('style');
        s.textContent = style.textContent;
        document.head.appendChild(s);
      }
      document.title = (result.querySelector('title') || {}).textContent || document.title;

      var body = result.querySelector('body');
      var content = document.getElementById('content');
      if (body) {
        content.innerHTML = body.innerHTML;
      } else {
        // Fallback: dump everything.
        var ser = new XMLSerializer();
        content.innerHTML = ser.serializeToString(result.documentElement);
      }

      // 6. Rewrite navigation links for SPA routing (all pages).
      rewriteNavLinks(content);

      // 6b. Inject prev/next links and chapter list that the XSL couldn't
      //     produce because XSLTProcessor blocks document() calls.
      if (!isIndex && indexDoc) injectChapterNav(content, indexDoc);

      // 7. Show content, hide spinner.
      document.getElementById('loading').style.display = 'none';
      content.style.display = 'block';

      // 8. Re-run any JS the XSL expects (transliteration, lexicon panel, etc.).
      activateScripts(content);
    }

    // Re-execute inline <script> tags injected via innerHTML (browsers don't
    // run them automatically).
    function activateScripts(root) {
      var scripts = root.querySelectorAll('script');
      for (var i = 0; i < scripts.length; i++) {
        var src = scripts[i].src;
        var s   = document.createElement('script');
        if (src) {
          s.src   = src;
          s.async = false;
        } else {
          s.textContent = scripts[i].textContent;
        }
        document.head.appendChild(s);
      }
    }

    // ── Entry point ──────────────────────────────────────────────────────

    var params  = new URLSearchParams(window.location.search);
    var chFile  = params.get('ch');           // e.g. 'ch05_syntax.xml' or null
    var isIndex = !chFile;

    // When accessed without a ?ch= param the native XML+XSL path is much
    // faster, so just hand off to index.xml immediately.
    if (isIndex) {
      window.location.replace('index.xml');
      return;
    }

    var xmlFile = chFile;

    Promise.all([
      fetchText(xmlFile),
      fetchText('grammar.xsl').then(parseXml),
      fetchText('lexicon.xml').then(parseXml),
      // Always fetch index.xml for chapter pages so injectChapterNav() has
      // the chapter list (document() is blocked inside XSLTProcessor).
      isIndex ? Promise.resolve(null) : fetchText('index.xml').then(parseXml),
    ]).then(function (results) {
      render(results[0], results[1], results[2], isIndex, results[3]);
    }).catch(function (err) {
      console.error(err);
      showError('Could not load ' + xmlFile, err.message);
    });

  }());
  </script>
</body>
</html>
